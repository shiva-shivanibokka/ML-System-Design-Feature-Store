# =============================================================================
# Application configuration
# =============================================================================

app:
  name: "ML Feature Store"
  version: "1.0.0"
  feature_version: "v1"

clickhouse:
  host: "${CLICKHOUSE_HOST:localhost}"
  port: 9000
  database: feature_store
  user: fs_user
  password: "${CLICKHOUSE_PASSWORD:fs_pass}"
  connect_timeout: 10
  send_receive_timeout: 300

redis:
  host: "${REDIS_HOST:localhost}"
  port: 6379
  db: 0
  decode_responses: true
  # TTL for online store entries (seconds) — 48 hours
  ttl: 172800
  # Key pattern: entity:{entity_type}:{entity_id}
  key_prefix: "entity"

mlflow:
  tracking_uri: "${MLFLOW_TRACKING_URI:http://localhost:5001}"
  experiment_name: "churn-prediction-feature-store"
  model_name: "churn-predictor"

materialization:
  # Entities to materialize per batch (controls Redis pipeline chunk size)
  batch_size: 500
  # How many parallel threads for on-demand computation
  on_demand_workers: 4
  # Schedule: run every 6 hours
  schedule_hours: 6

training:
  # Feature columns used for model training (must match feature_history columns)
  feature_columns:
    - txn_count_7d
    - txn_count_30d
    - txn_count_90d
    - total_spend_7d
    - total_spend_30d
    - total_spend_90d
    - avg_txn_amount_30d
    - failed_txn_rate_30d
    - days_since_last_txn
    - open_tickets
    - ticket_rate_30d
    - account_age_days
    - plan_encoded
  label_column: "churned"
  test_size: 0.2
  random_state: 42

skew:
  # KS test p-value threshold below which we flag skew
  ks_threshold: 0.05
  # Max allowed absolute difference in feature means (relative to std)
  mean_shift_threshold: 0.3

serving:
  # Latency budget per path (ms) — used for logging/alerting
  batch_path_budget_ms: 5
  on_demand_path_budget_ms: 50
