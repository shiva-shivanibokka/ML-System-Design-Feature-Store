name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest pytest-cov pandera pandas numpy scipy structlog pyyaml

      - name: Lint with ruff
        run: |
          ruff check . --select E,W,F,I --ignore E501
          ruff format --check .

      - name: Run unit tests (no infra required)
        run: |
          pytest tests/test_validator.py tests/test_skew.py \
            -v \
            --tb=short \
            --cov=feature_store \
            --cov=skew \
            --cov-report=term-missing \
            --cov-fail-under=70

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t feature-store-api:ci .

      - name: Build Gradio image
        run: docker build -f Dockerfile.gradio -t feature-store-gradio:ci .

      - name: Verify API image starts
        run: |
          docker run --rm -d \
            -e CLICKHOUSE_HOST=localhost \
            -e REDIS_HOST=localhost \
            --name ci_api \
            feature-store-api:ci || true
          sleep 5
          docker logs ci_api 2>&1 | head -20 || true
          docker stop ci_api 2>/dev/null || true
