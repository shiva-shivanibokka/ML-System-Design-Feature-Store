name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check . --select E,W,F,I --ignore E501
      - run: ruff format --check .
      - run: pytest tests/ -v --cov=feature_store --cov=skew --cov=serving --cov-report=term-missing --cov-fail-under=52

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t feature-store-api:ci .
