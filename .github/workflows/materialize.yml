name: Materialize

on:
  schedule: [{ cron: "0 */6 * * *" }]
  workflow_dispatch:

env:
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
  DUCKDB_DATABASE: ${{ secrets.DUCKDB_DATABASE }}
  REDIS_URL: ${{ secrets.REDIS_URL }}

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.api.txt
      - run: python materialization/materialize.py

  keep-warm:
    runs-on: ubuntu-latest
    steps:
      # Ping the Cloud Run service /health so a scale-to-zero instance is warm.
      # --retry rides out a cold start; a persistent failure surfaces (no `|| true`).
      - run: curl -fsS --retry 5 --retry-all-errors --retry-delay 10 "${{ secrets.CLOUD_RUN_URL }}/health"
